apiVersion: apps/v1
kind: Deployment
metadata:
  name: clusterpulse
  labels:
    app: clusterpulse
    env: dev
    component: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clusterpulse
      component: web
  template:
    metadata:
      labels:
        app: clusterpulse
        env: dev
        component: web
    spec:
      containers:
      - name: clusterpulse
        image: clusterpulse:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 12