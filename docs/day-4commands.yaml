## Intentionally breaking a probe

The safest Day 4 failure demo is to break the **readiness probe** first.

Why readiness first?

- It is safer than liveness
- It shows how Kubernetes removes a Pod from traffic
- It usually does not restart the container
- It lets you observe `0/1 Ready`

### Temporary broken readiness probe

Change this:

```yaml
readinessProbe:
  httpGet:
    path: /ready
    port: 5000
```

To this:

```yaml
readinessProbe:
  httpGet:
    path: /not-ready
    port: 5000
```

Then apply again:

```bash
kubectl apply -f manifests/deployment.yaml
kubectl get pods -w
kubectl describe pod <pod-name>
kubectl get endpoints clusterpulse-service
kubectl get events --sort-by=.lastTimestamp | tail -20
```

### What to expect

- Pod may show `0/1 Ready`
- Container may still be running
- Service endpoints may stop including that Pod
- `kubectl describe pod` may show `Warning` and `Unhealthy`
- App may remain alive, but Kubernetes stops routing traffic to that Pod

---

## What happens if liveness probe is broken

If you intentionally break liveness instead:

```yaml
livenessProbe:
  httpGet:
    path: /bad-health
    port: 5000
```

Then Kubernetes will eventually restart the container after repeated failures.

### What to expect

- `RESTARTS` count increases
- Pod may still exist, but container restarts inside it
- `kubectl describe pod` shows liveness probe failures
- `kubectl logs <pod-name> --previous` becomes very useful

### Why this is more dangerous

Because a badly configured liveness probe can cause healthy applications to restart in a loop.
That is why readiness is the safer first demo.

---

## How to read outputs during Day 4

### `kubectl get pods`

This is the first view.

What to read:

- `READY`
- `STATUS`
- `RESTARTS`
- Pod age

### Meaning of common values

- `1/1 Running` = container is running and ready
- `0/1 Running` = container may still be running, but it is not ready
- `CrashLoopBackOff` = repeated restarts after failure
- `RESTARTS > 0` = container has been restarted at least once

### `kubectl describe pod <pod-name>`

This is the most important debugging command for probes.

What to look for:

- Events section at the bottom
- `Warning`
- `Unhealthy`
- Probe failure messages
- Restart or killing messages

Typical clues:

- readiness probe failed
- liveness probe failed
- startup probe failed
- container restarted

### `kubectl logs <pod-name>`

This shows the current container logs.

Use this when:

- The app starts but behaves oddly
- The endpoint path may be wrong
- You want to see whether Flask is actually serving requests

### `kubectl logs <pod-name> --previous`

This is critical when restarts happen.

Use it when:

- Liveness or startup caused a restart
- Current logs do not show the previous failed run

### `kubectl get endpoints clusterpulse-service`

This shows which Pod IPs are currently serving behind the Service.

What to look for:

- If endpoints exist, the Service is targeting backend Pods
- If readiness fails, a Pod may disappear from endpoints
- If endpoints are empty, the Service has nothing to send traffic to

### `kubectl get events --sort-by=.lastTimestamp | tail -20`

This shows recent cluster events.

Use it when:

- You want a quick recent history of failures
- You want to confirm probe failures, restarts, and unhealthy events

