## Day 4 troubleshooting flow

Use this order whenever something goes wrong:

1. Check Pods
2. Check rollout status
3. Check ReplicaSets
4. Describe a Pod
5. Check logs
6. Check previous logs if there were restarts
7. Check Service endpoints
8. Check recent events

### Command flow

```bash
kubectl get pods
kubectl rollout status deployment/clusterpulse
kubectl get rs
kubectl describe pod <pod-name>
kubectl logs <pod-name>
kubectl logs <pod-name> --previous
kubectl get endpoints clusterpulse-service
kubectl get events --sort-by=.lastTimestamp | tail -20
```

---

## Common Day 4 problems and mitigation

### Problem 1: Pod shows `0/1 Ready`

**Meaning:**
Usually readiness probe is failing.

**What to check:**

- Is the readiness path correct?
- Does the app return success on `/ready`?
- Does `kubectl describe pod` show readiness failures?

**Mitigation:**

- Fix the readiness path
- Confirm the port is correct
- Restore the original endpoint if you intentionally broke it

---

### Problem 2: Restart count increases

**Meaning:**
Usually liveness or startup probe is failing.

**What to check:**

- `kubectl describe pod <pod-name>`
- `kubectl logs <pod-name> --previous`

**Mitigation:**

- Fix the liveness or startup path
- Increase delays if app startup is slow
- Make sure liveness is not checking something too strict

---

### Problem 3: Service endpoints disappear

**Meaning:**
Pods may no longer be considered ready.

**What to check:**

- `kubectl get endpoints clusterpulse-service`
- `kubectl get pods`
- readiness probe status

**Mitigation:**

- Fix readiness probe first
- Confirm Pods become ready again

---

### Problem 4: Rollout hangs or old Pods stay around

**Meaning:**
The new Pods may not be becoming healthy enough for rollout to complete.

**What to check:**

- `kubectl rollout status deployment/clusterpulse`
- `kubectl get rs`
- `kubectl describe pod <new-pod>`

**Mitigation:**

- Fix probe configuration
- Re-apply corrected YAML
- Wait for healthy new Pods before old ones fully terminate

---

### Problem 5: Confusing cluster noise

On Day 4 there were also unrelated `nginx` Pods showing `ImagePullBackOff`.
Those were older, unrelated failures in the cluster.

**Important lesson:**
Do not let unrelated Pod failures distract you.
Focus on your app first with:

```bash
kubectl get pods -l app=clusterpulse
```

This filters the view to only ClusterPulse Pods.

---

## Best Day 4 mental model

Keep this in mind:

- Startup probe = “Has the app finished booting yet?”
- Readiness probe = “Can this Pod receive traffic right now?”
- Liveness probe = “Should this container keep running, or should Kubernetes restart it?”

And the operational meaning:

- Startup failure delays the other probes
- Readiness failure removes the Pod from Service traffic
- Liveness failure restarts the container

---

## Best Day 4 memory lines

Use these to revise later:

- Readiness affects traffic.
- Liveness affects restarts.
- Startup protects slow boot.
- `kubectl describe pod` is the most important Day 4 debugging command.
- `kubectl logs --previous` matters when containers restart.
- Empty endpoints often mean readiness issues.
- `0/1 Ready` usually means readiness failure, not necessarily a crash.

