# Day 4 Notes - Probes, Testing, and Troubleshooting

This document summarizes everything covered on Day 4 of the ClusterPulse project.
It explains what probes are, why Day 4 matters, how readiness, liveness, and startup probes work, how to implement them, how to test them, how to intentionally break one safely, and how to troubleshoot probe-related issues.

---

## Day 4 Goal

Day 4 is about teaching Kubernetes how to understand the health of the application.

By the end of Day 3, ClusterPulse already had:

- A Flask app running in a Deployment
- 3 Pods created by that Deployment
- A Service in front of those Pods
- Labels and selectors working
- Internal DNS/service discovery tested

That means the app could run and could be discovered.

Day 4 adds the next layer:

- When should Kubernetes send traffic to a Pod?
- When should Kubernetes stop sending traffic to a Pod?
- When should Kubernetes restart a broken Pod?
- When should Kubernetes wait for the app to finish starting up?

That is what probes solve.

---

## Why Day 4 matters

Without probes, Kubernetes only knows whether the container process exists.
It does not really know whether the application is ready to serve traffic or whether it is unhealthy internally.

Probes allow Kubernetes to make better decisions.

### Readiness probe

Readiness answers:

> Is this Pod ready to receive traffic right now?

If readiness fails:

- The Pod may still be running
- But Kubernetes removes it from Service traffic
- The Pod may show `0/1 Ready`
- The container is usually **not** restarted just because readiness fails

### Liveness probe

Liveness answers:

> Is this container still healthy enough to keep running?

If liveness fails repeatedly:

- Kubernetes restarts the container
- Restart count increases
- The Pod may stay in `Running`, but the container inside restarts

### Startup probe

Startup answers:

> Has the application finished starting up yet?

If startup probe is configured:

- Kubernetes waits for startup to succeed before enforcing liveness/readiness
- This protects slow-starting apps from being restarted too early

---

## Day 4 in one sentence

Day 3 made the app discoverable.
Day 4 makes the app **health-aware**.

---

## Probe mapping for ClusterPulse

For the ClusterPulse Flask app, the clean mapping is:

- `/ready` -> readiness probe
- `/healthz` -> liveness probe
- `/healthz` (or a similar health endpoint) -> startup probe

Why this mapping?

- `/ready` should mean “safe to receive traffic”
- `/healthz` should mean “app is alive and should not be restarted”
- `startupProbe` should give the app time to come up before the other probes take over

---

## Baseline checks before adding probes

Before changing the Deployment, the first step is always to confirm the Day 3 state is healthy.

### Commands

```bash
kubectl get deployments
kubectl get svc
kubectl get pods -o wide
kubectl get endpoints clusterpulse-service
kubectl logs -l app=clusterpulse
```

### What to look for

- Deployment desired replicas and available replicas should match
- Service should exist
- Endpoints should be populated
- Pods should be `Running`
- App logs should look normal

### Why this matters

If something is already broken before probes are added, it becomes harder to know whether a new failure is caused by probes or by an older issue.

---

## Day 4 implementation order

This was the safest implementation order:

1. Confirm Day 3 is healthy
2. Add readiness probe
3. Apply and observe normal behavior
4. Add liveness probe
5. Apply and observe normal behavior
6. Add startup probe
7. Confirm rollout success
8. Break one probe intentionally once
9. Observe `0/1 Ready`, restarts, events, and logs
10. Restore the correct probe configuration

---

## Final Deployment YAML with probes

Use this version in `manifests/deployment.yaml`:

```yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clusterpulse
  labels:
    app: clusterpulse
    env: dev
    component: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clusterpulse
  template:
    metadata:
      labels:
        app: clusterpulse
        env: dev
        component: web
    spec:
      containers:
      - name: clusterpulse
        image: clusterpulse:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 12
```

---

## Why these probe settings were chosen

### Readiness probe settings

```yaml
readinessProbe:
  httpGet:
    path: /ready
    port: 5000
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 2
```

### Meaning

- `path: /ready` checks whether the app is ready for traffic
- `initialDelaySeconds: 3` gives the app a short time before first check
- `periodSeconds: 5` checks every 5 seconds
- `timeoutSeconds: 2` fails if the endpoint does not respond fast enough
- `failureThreshold: 2` means repeated failures are needed before it is marked unready

### Liveness probe settings

```yaml
livenessProbe:
  httpGet:
    path: /healthz
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
```

### Meaning

- `path: /healthz` checks whether the app is still alive
- `initialDelaySeconds: 10` is longer so Kubernetes does not restart the app too early
- `periodSeconds: 10` checks every 10 seconds
- `failureThreshold: 3` gives some tolerance before restarting

### Startup probe settings

```yaml
startupProbe:
  httpGet:
    path: /healthz
    port: 5000
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 12
```

### Meaning

- The app gets extra startup time
- Until startup succeeds, liveness and readiness are effectively held back
- `failureThreshold * periodSeconds` gives the allowed startup window

In this case:

- `12 * 5 = 60 seconds`

So the app gets up to about 60 seconds to start successfully.

