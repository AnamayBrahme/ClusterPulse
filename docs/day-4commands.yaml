## Understanding rollout output on Day 4

A typical output looked like this:

```text
NAME                            READY   STATUS        RESTARTS   AGE
clusterpulse-66c7758c8f-5d6zc   1/1     Running       0          26s
clusterpulse-66c7758c8f-6m2kx   1/1     Running       0          21s
clusterpulse-66c7758c8f-lzmw8   1/1     Running       0          15s
clusterpulse-b6cd8599f-nd97w    1/1     Terminating   1          3h35m
clusterpulse-b6cd8599f-p4fvh    1/1     Terminating   1          3h35m
clusterpulse-b6cd8599f-tvt8b    1/1     Terminating   1          3h35m
```

### How to read this

- The new ReplicaSet created Pods with a new hash, here `66c7758c8f`
- Those new Pods are healthy because they show `1/1 Running`
- The old ReplicaSet Pods with the previous hash are being scaled down and terminated
- This is normal during a rollout

### Important interpretation

If the **new** Pods are healthy, then the rollout is likely successful even if the old Pods are still terminating.

